<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <table width="100%">
            <tr>
                <td align="left">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Logo" width="160">
                    </a>
                </td>

                <td align="right">
                    <div class="auth-btn-container">
                        <button id="open-auth-modal" class="auth-btn">Se connecter</button>
                        <button id="create-place-btn" class="create-place-btn" style="display:none;">Créer une place</button>
                        <button id="logout-btn" class="logout-btn" style="display:none;">Se déconnecter</button>
                    </div>
                </td>
            </tr>
        </table>

        <hr>
    </header>

        <main>
                <div id="auth-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card">
                        <div class="auth-card">
                            <button class="close-modal-btn" id="close-auth-modal" aria-label="Fermer">&times;</button>
                            <div class="auth-logo">
                                <img src="images/logo.png" alt="Logo HBNB">
                            </div>
                            <h1>Connexion</h1>
                            <br>
                            <form action="#" method="post" class="auth-form">
                                <label for="email">Adresse email</label>
                                <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
                                <br>
                                <label for="password">Mot de passe</label>
                                <input type="password" id="password" name="password" placeholder="••••••••" required>
                                <br>
                                <button type="submit" class="auth-btn">Se connecter</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div id="create-place-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card">
                        <div class="auth-card">
                            <button class="close-modal-btn" id="close-place-modal" aria-label="Fermer">&times;</button>
                            <div class="auth-logo">
                                <img src="images/logo.png" alt="Logo HBNB">
                            </div>
                            <h1>Créer une place</h1>
                            <br>
                            <form action="#" method="post" id="create-place-form" class="auth-form">
                                <label for="place-title">Titre</label>
                                <input type="text" id="place-title" name="title" placeholder="Studio moderne" required>
                                <label for="place-description">Description</label>
                                <textarea id="place-description" name="description" placeholder="Décrivez..." rows="2"></textarea>
                                <label for="place-price">Prix/nuit (€)</label>
                                <input type="number" id="place-price" name="price" placeholder="80" step="0.01" required>
                                <label for="place-latitude">Latitude</label>
                                <input type="number" id="place-latitude" name="latitude" placeholder="48.8566" step="0.0001" required>
                                <label for="place-longitude">Longitude</label>
                                <input type="number" id="place-longitude" name="longitude" placeholder="2.3522" step="0.0001" required>
                                <label for="place-amenities">Commodités (IDs séparés par virgules - optionnel)</label>
                                <input type="text" id="place-amenities" name="amenities" placeholder="ID1,ID2">
                                <button type="submit" class="auth-btn">Créer</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div id="place-detail-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card">
                        <div class="auth-card" id="place-detail-card">
                            <button class="close-modal-btn" id="close-place-detail-modal" aria-label="Fermer">&times;</button>
                            <div id="place-detail-content"></div>
                        </div>
                    </div>
                </div>
                <div id="main-content">
                    <div id="logement-detail" class="logement-detail-card" style="display:none;"></div>
                    <table id="logements-table" cellpadding="20" align="center"></table>
    </main>
    <footer>
        <hr>
        <div style="display: flex; justify-content: center; align-items: center; position: relative; min-height: 40px;">
            <span style="position: absolute; right: 0;">
                <a href="https://github.com/tomvieilledent">About Us</a> |
                <a href="https://www.linkedin.com/in/tom-vieilledent-51a838199">Contact Us</a>
            </span>
            <span style="margin: 0 auto; font-weight: bold;">Tom Vieilledent - Holberton HBNB - 2026</span>
        </div>
    </footer>


<script>
document.addEventListener('DOMContentLoaded', function() {
            // Déclarer les variables au début
            var openBtn = document.getElementById('open-auth-modal');
            var logoutBtn = document.getElementById('logout-btn');
            var createPlaceBtn = document.getElementById('create-place-btn');
            var authModal = document.getElementById('auth-modal');
            var createPlaceModal = document.getElementById('create-place-modal');
            var mainContent = document.getElementById('main-content');
            var closeBtn = document.getElementById('close-auth-modal');
            var closePlaceBtn = document.getElementById('close-place-modal');
            var loginForm = document.querySelector('.auth-form');
            var createPlaceForm = document.getElementById('create-place-form');
            var closeTimeout = null;
            var isConnected = false;
            var placeDetailModal = document.getElementById('place-detail-modal');
            var closePlaceDetailBtn = document.getElementById('close-place-detail-modal');
            
            // Vérifier si l'utilisateur est déjà connecté
            const token = localStorage.getItem('access_token');
            if (token) {
                openBtn.style.display = 'none';
                createPlaceBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'inline-block';
                isConnected = true;
            }
            
            // Gestion de la tuile de détail logement
            var logementDetail = document.getElementById('logement-detail');
            var logementsTable = document.getElementById('logements-table');
            function showLogementDetail(img, title, ville) {
                    logementDetail.innerHTML = `
                        <div class="logement-detail-inner">
                            <img src="${img}" alt="${title}" class="logement-detail-img">
                            <div class="logement-detail-info">
                                <h2>${title}</h2>
                                <p>${ville}</p>
                            </div>
                        </div>
                        <button class="close-detail-arrow" id="close-detail-arrow" aria-label="Fermer la fiche">&#8595;</button>
                    `;
                    logementDetail.classList.add('show-detail');
                    logementDetail.style.display = 'flex';
                    setTimeout(function() {
                        logementDetail.classList.add('visible');
                        logementsTable.classList.add('shifted');
                    }, 10);
                    logementDetail.scrollIntoView({behavior: 'smooth', block: 'start'});
                    document.getElementById('close-detail-arrow').onclick = function() {
                        logementDetail.classList.remove('visible');
                        logementsTable.classList.remove('shifted');
                        setTimeout(function() {
                            logementDetail.classList.remove('show-detail');
                            logementDetail.style.display = 'none';
                        }, 350);
                    };
            }
            
            // Gestion des clics sur les boutons
            openBtn.onclick = function(e) {
        e.preventDefault();
        authModal.style.display = 'flex';
        setTimeout(function() {
            authModal.classList.add('visible');
            document.querySelector('.auth-card').classList.add('visible');
        }, 10);
        mainContent.classList.add('blur-bg');
        openBtn.classList.add('active');
        if (closeTimeout) {
            clearTimeout(closeTimeout);
            closeTimeout = null;
        }
    };
    // Fonction de fermeture
    function closeAuthModal() {
        authModal.classList.remove('visible');
        document.querySelector('.auth-card').classList.remove('visible');
        setTimeout(function() {
            authModal.style.display = 'none';
        }, 350);
        mainContent.classList.remove('blur-bg');
        if (!isConnected) {
            openBtn.classList.remove('active');
        }
    }
    // Ferme la modale avec la croix
    closeBtn.onclick = function(e) {
        e.preventDefault();
        closeAuthModal();
    };
    // Ferme la modale si clic sur le fond
    authModal.onclick = function(e) {
        // Empêche la fermeture si le focus est sur un input du formulaire
        var active = document.activeElement;
        if (e.target === this && !(active && (active.id === 'email' || active.id === 'password'))) {
            closeAuthModal();
        }
    };
    // Connexion : cache le bouton connexion, affiche déconnexion
    loginForm.onsubmit = function(e) {
        e.preventDefault();
        
        // Récupérer les valeurs du formulaire
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        
        // Désactiver le bouton pendant la requête
        submitBtn.disabled = true;
        submitBtn.textContent = 'Connexion...';
        
        // Faire la requête POST au backend
        fetch('http://127.0.0.1:5000/api/v1/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.error || 'Erreur de connexion');
                });
            }
            return response.json();
        })
        .then(data => {
            // Sauvegarder le token JWT et l'ID utilisateur
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_email', email);
            localStorage.setItem('user_id', data.user_id);
            
            // Fermer la modale et mettre à jour l'interface
            closeAuthModal();
            openBtn.style.display = 'none';
            createPlaceBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'inline-block';
            openBtn.classList.remove('active');
            isConnected = true;
            
            // Réinitialiser le formulaire
            loginForm.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            
            // Message de succès (optionnel)
            alert('Connexion réussie!');
        })
        .catch(error => {
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            alert('Erreur: ' + error.message);
            console.error('Erreur de connexion:', error);
        });
    };
    // Déconnexion : inverse
    logoutBtn.onclick = function(e) {
        e.preventDefault();
        // Vider le token, l'email et l'ID de l'utilisateur du localStorage
        localStorage.removeItem('access_token');
        localStorage.removeItem('user_email');
        localStorage.removeItem('user_id');
        
        logoutBtn.style.display = 'none';
        createPlaceBtn.style.display = 'none';
        openBtn.style.display = 'inline-block';
        isConnected = false;
        // Désactive le hover tant que la souris n'est pas ressortie
        openBtn.classList.add('no-hover');
        alert('Vous avez été déconnecté!');
    };
    
    // Gestion de la modale de création de place
    createPlaceBtn.onclick = function(e) {
        e.preventDefault();
        createPlaceModal.style.display = 'flex';
        setTimeout(function() {
            createPlaceModal.classList.add('visible');
            document.querySelectorAll('#create-place-modal .auth-card')[0].classList.add('visible');
        }, 10);
        mainContent.classList.add('blur-bg');
    };
    
    // Ferme la modale de création avec la croix
    closePlaceBtn.onclick = function(e) {
        e.preventDefault();
        createPlaceModal.classList.remove('visible');
        document.querySelectorAll('#create-place-modal .auth-card')[0].classList.remove('visible');
        setTimeout(function() {
            createPlaceModal.style.display = 'none';
        }, 350);
        mainContent.classList.remove('blur-bg');
    };
    
    // Ferme la modale de création si clic sur le fond
    createPlaceModal.onclick = function(e) {
        if (e.target === this) {
            closePlaceBtn.click();
        }
    };
    
    // Soumission du formulaire de création de place
    createPlaceForm.onsubmit = function(e) {
        e.preventDefault();
        
        const title = document.getElementById('place-title').value;
        const description = document.getElementById('place-description').value;
        const price = parseFloat(document.getElementById('place-price').value);
        const latitude = parseFloat(document.getElementById('place-latitude').value);
        const longitude = parseFloat(document.getElementById('place-longitude').value);
        const amenitiesStr = document.getElementById('place-amenities').value.trim();
        const amenities = amenitiesStr ? amenitiesStr.split(',').map(id => id.trim()) : [];
        
        // Sélectionner une image aléatoire parmi les logements
        const logementImages = [
            'images/logement1.jpg',
            'images/logement2.jpg',
            'images/logement3.jpg',
            'images/logement4.jpg',
            'images/logement5.jpg',
            'images/logement6.jpg',
            'images/logement7.jpg',
            'images/logement8.jpg',
            'images/logement9.jpg',
            'images/logement10.jpg'
        ];
        const randomImage = logementImages[Math.floor(Math.random() * logementImages.length)];
        
        const submitBtn = createPlaceForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Création...';
        
        const token = localStorage.getItem('access_token');
        
        fetch('http://127.0.0.1:5000/api/v1/places/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                title,
                description,
                price,
                latitude,
                longitude,
                amenities
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.message || data.error || 'Erreur de création');
                });
            }
            return response.json();
        })
        .then(data => {
            alert('Place créée avec succès!');
            createPlaceForm.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            closePlaceBtn.click();
            loadPlaces(); // Recharger la liste des places
        })
        .catch(error => {
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            alert('Erreur: ' + error.message);
            console.error('Erreur de création:', error);
        });
    };
    
    // Fonction pour charger et afficher les places depuis l'API
    function loadPlaces() {
        fetch('http://127.0.0.1:5000/api/v1/places/', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(places => {
            logementsTable.innerHTML = ''; // Vider la table
            
            if (!places || places.length === 0) {
                logementsTable.innerHTML = '<tr><td colspan="5" align="center"><p>Aucune place disponible</p></td></tr>';
                return;
            }
            
            // Construire le tableau avec 5 colonnes par ligne
            let currentRow = null;
            places.forEach((place, index) => {
                // Créer une nouvelle ligne tous les 5 éléments
                if (index % 5 === 0) {
                    currentRow = document.createElement('tr');
                    logementsTable.appendChild(currentRow);
                }
                
                // Générer une image aléatoire basée sur l'ID (pour la consistance)
                const logementIndex = (parseInt(place.id.split('-')[0]) || index) % 10;
                const imgSrc = `images/logement${logementIndex + 1}.jpg`;
                
                // Créer la cellule
                const td = document.createElement('td');
                td.align = 'center';
                td.className = 'logement-tile';
                td.setAttribute('data-img', imgSrc);
                td.setAttribute('data-title', place.title);
                td.setAttribute('data-place-id', place.id);
                td.setAttribute('data-ville', place.title); // Utiliser le titre ou latitude/longitude
                
                td.innerHTML = `
                    <img src="${imgSrc}" alt="${place.title}">
                    <h3>${place.title}</h3>
                    <p>${place.price}€/nuit</p>
                `;
                
                // Stocker l'objet place complet pour l'utiliser au clic
                td.placeData = place;
                td.imgSrc = imgSrc;
                
                currentRow.appendChild(td);
            });
            
            // Ajouter les event listeners aux tuiles
            document.querySelectorAll('.logement-tile').forEach(function(tile) {
                tile.addEventListener('click', function() {
                    showPlaceDetailModal(tile.placeData, tile.imgSrc);
                });
            });
        })
        .catch(error => {
            console.error('Erreur lors du chargement des places:', error);
            logementsTable.innerHTML = '<tr><td colspan="5" align="center"><p>Erreur lors du chargement des places</p></td></tr>';
        });
    }
        // Ferme la modale de détail avec la croix
    closePlaceDetailBtn.onclick = function(e) {
        e.preventDefault();
        placeDetailModal.classList.remove('visible');
        document.getElementById('place-detail-card').classList.remove('visible');
        setTimeout(function() {
            placeDetailModal.style.display = 'none';
        }, 350);
        mainContent.classList.remove('blur-bg');
    };
    
    // Ferme la modale de détail si clic sur le fond
    placeDetailModal.onclick = function(e) {
        if (e.target === this) {
            closePlaceDetailBtn.click();
        }
    };
    
    // Fonction pour afficher les détails complets d'une place avec un formulaire de review
    function showPlaceDetailModal(place, imgSrc) {
        const placeDetailContent = document.getElementById('place-detail-content');
        const token = localStorage.getItem('access_token');
        const userId = localStorage.getItem('user_id');
        
        // Afficher d'abord le contenu de base
        placeDetailContent.innerHTML = `
            <div class="place-detail-header">
                <img src="${imgSrc}" alt="${place.title}" style="width: 100%; max-height: 300px; object-fit: cover; margin-bottom: 15px; border-radius: 8px;">
                <h2>${place.title}</h2>
                <p><strong>Prix:</strong> ${place.price}€/nuit</p>
                <p><strong>Description:</strong> ${place.description || 'N/A'}</p>
                <p><strong>Localisation:</strong> Lat ${place.latitude}, Lon ${place.longitude}</p>
            </div>
            
            <hr style="margin: 15px 0;">
            
            <div id="reviews-list" class="reviews-section">
                <h3>Avis</h3>
                <p>Chargement des avis...</p>
            </div>
            
            <div id="review-form-section"></div>
        `;
        
        placeDetailModal.style.display = 'flex';
        setTimeout(function() {
            placeDetailModal.classList.add('visible');
            document.getElementById('place-detail-card').classList.add('visible');
        }, 10);
        mainContent.classList.add('blur-bg');
        
        // Charger les reviews pour cette place
        fetch(`http://127.0.0.1:5000/api/v1/places/${place.id}/reviews`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(reviews => {
            const reviewsList = document.getElementById('reviews-list');
            
            if (!reviews || reviews.length === 0) {
                reviewsList.innerHTML = '<h3>Avis</h3><p>Aucun avis pour le moment</p>';
            } else {
                let reviewsHTML = '<h3>Avis</h3>';
                reviews.forEach(review => {
                    let reviewContent = `
                        <div class="review-item">
                            <div class="review-header">
                                <span class="review-rating">⭐ ${review.rating}/5</span>
                                <span class="review-user">${review.user?.first_name || 'Anonyme'}</span>
                    `;
                    
                    // Ajouter les boutons modifier/supprimer si c'est la review de l'utilisateur connecté
                    if (token && userId && review.user_id === userId) {
                        reviewContent += `
                            <div class="review-actions">
                                <button class="review-edit-btn" data-review-id="${review.id}">✏️</button>
                                <button class="review-delete-btn" data-review-id="${review.id}">🗑️</button>
                            </div>
                        `;
                    }
                    
                    reviewContent += `
                            </div>
                            <p class="review-text">${review.text || 'Pas de commentaire'}</p>
                        </div>
                    `;
                    reviewsHTML += reviewContent;
                });
                reviewsList.innerHTML = reviewsHTML;
                
                // Ajouter les event listeners pour les boutons
                document.querySelectorAll('.review-delete-btn').forEach(btn => {
                    btn.onclick = function(e) {
                        e.preventDefault();
                        const reviewId = this.getAttribute('data-review-id');
                        if (confirm('Êtes-vous sûr de vouloir supprimer cet avis?')) {
                            deleteReview(reviewId, place, imgSrc);
                        }
                    };
                });
                
                document.querySelectorAll('.review-edit-btn').forEach(btn => {
                    btn.onclick = function(e) {
                        e.preventDefault();
                        const reviewId = this.getAttribute('data-review-id');
                        const reviewItem = reviews.find(r => r.id === reviewId);
                        editReview(reviewItem, place, imgSrc);
                    };
                });
            }
        })
        .catch(error => {
            console.error('Erreur lors du chargement des reviews:', error);
            document.getElementById('reviews-list').innerHTML = '<h3>Avis</h3><p>Erreur lors du chargement des avis</p>';
        });
        
        // Section formulaire de review
        const formSection = document.getElementById('review-form-section');
        
        if (token) {
            // Vérifier si l'utilisateur est le propriétaire ou a déjà une review
            fetch(`http://127.0.0.1:5000/api/v1/places/${place.id}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(fullPlace => {
                // Charger les reviews à nouveau pour vérifier si l'utilisateur en a une
                fetch(`http://127.0.0.1:5000/api/v1/places/${place.id}/reviews`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(reviews => {
                    const isOwner = fullPlace.owner && fullPlace.owner.id === userId;
                    const userReview = reviews.find(r => r.user_id === userId);
                    
                    if (isOwner) {
                        formSection.innerHTML = `
                            <hr style="margin: 15px 0;">
                            <div class="review-section error-section">
                                <p class="error-message">❌ Vous ne pouvez pas laisser d'avis sur votre propre place</p>
                            </div>
                        `;
                    } else if (userReview) {
                        formSection.innerHTML = `
                            <hr style="margin: 15px 0;">
                            <div class="review-section">
                                <p class="info-message">✓ Vous avez déjà laissé un avis. Modifiez ou supprimez-le ci-dessus.</p>
                            </div>
                        `;
                    } else {
                        formSection.innerHTML = `
                            <hr style="margin: 15px 0;">
                            <div class="review-section">
                                <h3>Ajouter un avis</h3>
                                <form id="review-form">
                                    <label for="review-rating">Note (1-5)</label>
                                    <select id="review-rating" required>
                                        <option value="">Sélectionner une note</option>
                                        <option value="1">1 - Mauvais</option>
                                        <option value="2">2 - Moyen</option>
                                        <option value="3">3 - Bon</option>
                                        <option value="4">4 - Très bon</option>
                                        <option value="5">5 - Excellent</option>
                                    </select>
                                    <label for="review-text">Votre avis</label>
                                    <textarea id="review-text" placeholder="Partagez votre expérience..." rows="3"></textarea>
                                    <button type="submit" class="auth-btn">Envoyer l'avis</button>
                                </form>
                            </div>
                        `;
                        
                        setTimeout(function() {
                            document.getElementById('review-form').onsubmit = function(e) {
                                e.preventDefault();
                                
                                const rating = parseInt(document.getElementById('review-rating').value);
                                const text = document.getElementById('review-text').value;
                                
                                const submitBtn = document.querySelector('#review-form button[type="submit"]');
                                const originalBtnText = submitBtn.textContent;
                                
                                submitBtn.disabled = true;
                                submitBtn.textContent = 'Envoi...';
                                
                                fetch(`http://127.0.0.1:5000/api/v1/places/${place.id}/reviews`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${token}`
                                    },
                                    body: JSON.stringify({
                                        rating,
                                        text
                                    })
                                })
                                .then(response => {
                                    if (!response.ok) {
                                        return response.json().then(data => {
                                            throw new Error(data.message || data.error || 'Erreur d\'envoi');
                                        });
                                    }
                                    return response.json();
                                })
                                .then(data => {
                                    alert('Avis envoyé avec succès!');
                                    document.getElementById('review-form').reset();
                                    submitBtn.disabled = false;
                                    submitBtn.textContent = originalBtnText;
                                    // Recharger la modale pour voir le nouvel avis
                                    showPlaceDetailModal(place, imgSrc);
                                })
                                .catch(error => {
                                    submitBtn.disabled = false;
                                    submitBtn.textContent = originalBtnText;
                                    alert('Erreur: ' + error.message);
                                    console.error('Erreur d\'envoi d\'avis:', error);
                                });
                            };
                        }, 50);
                    }
                });
            });
        } else {
            formSection.innerHTML = `
                <hr style="margin: 15px 0;">
                <div class="review-section">
                    <p class="login-prompt">Connectez-vous pour ajouter un avis</p>
                </div>
            `;
        }
    }
    
    // Fonction pour supprimer une review
    function deleteReview(reviewId, place, imgSrc) {
        const token = localStorage.getItem('access_token');
        
        fetch(`http://127.0.0.1:5000/api/v1/reviews/${reviewId}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.message || data.error || 'Erreur de suppression');
                });
            }
            return response.json();
        })
        .then(data => {
            alert('Avis supprimé avec succès!');
            showPlaceDetailModal(place, imgSrc);
        })
        .catch(error => {
            alert('Erreur: ' + error.message);
            console.error('Erreur de suppression:', error);
        });
    }
    
    // Fonction pour modifier une review
    function editReview(review, place, imgSrc) {
        const token = localStorage.getItem('access_token');
        const formSection = document.getElementById('review-form-section');
        
        formSection.innerHTML = `
            <hr style="margin: 15px 0;">
            <div class="review-section">
                <h3>Modifier votre avis</h3>
                <form id="edit-review-form">
                    <label for="edit-review-rating">Note (1-5)</label>
                    <select id="edit-review-rating" required>
                        <option value="1" ${review.rating === 1 ? 'selected' : ''}>1 - Mauvais</option>
                        <option value="2" ${review.rating === 2 ? 'selected' : ''}>2 - Moyen</option>
                        <option value="3" ${review.rating === 3 ? 'selected' : ''}>3 - Bon</option>
                        <option value="4" ${review.rating === 4 ? 'selected' : ''}>4 - Très bon</option>
                        <option value="5" ${review.rating === 5 ? 'selected' : ''}>5 - Excellent</option>
                    </select>
                    <label for="edit-review-text">Votre avis</label>
                    <textarea id="edit-review-text" placeholder="Partagez votre expérience..." rows="3">${review.text || ''}</textarea>
                    <button type="submit" class="auth-btn">Enregistrer les modifications</button>
                </form>
            </div>
        `;
        
        setTimeout(function() {
            document.getElementById('edit-review-form').onsubmit = function(e) {
                e.preventDefault();
                
                const rating = parseInt(document.getElementById('edit-review-rating').value);
                const text = document.getElementById('edit-review-text').value;
                
                const submitBtn = document.querySelector('#edit-review-form button[type="submit"]');
                const originalBtnText = submitBtn.textContent;
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enregistrement...';
                
                fetch(`http://127.0.0.1:5000/api/v1/reviews/${review.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        rating,
                        text
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(data => {
                            throw new Error(data.message || data.error || 'Erreur de mise à jour');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Avis mis à jour avec succès!');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalBtnText;
                    showPlaceDetailModal(place, imgSrc);
                })
                .catch(error => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalBtnText;
                    alert('Erreur: ' + error.message);
                    console.error('Erreur de mise à jour:', error);
                });
            };
        }, 50);
    }
    
    // Charger les places au démarrage
    loadPlaces();
            
            // Retire la classe no-hover au mouseleave
    openBtn.addEventListener('mouseleave', function() {
        openBtn.classList.remove('no-hover');
    });
});
</script>
