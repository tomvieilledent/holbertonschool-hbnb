<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <table width="100%">
            <tr>
                <td align="left">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Logo" width="160">
                    </a>
                </td>

                <td align="right">
                    <div class="auth-btn-container">
                        <button id="open-auth-modal" class="auth-btn">Se connecter</button>
                        <button id="create-place-btn" class="create-place-btn" style="display:none;">Créer une place</button>
                        <button id="admin-panel-btn" class="admin-panel-btn" style="display:none;">Admin Panel</button>
                        <button id="logout-btn" class="logout-btn" style="display:none;">Se déconnecter</button>
                        <button id="profile-btn" class="profile-btn-circle" style="display:none; margin-left: 10px;"></button>
                    </div>
                </td>
            </tr>
        </table>

        <hr>
    </header>

        <main>
                <div id="auth-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card">
                        <div class="auth-card">
                            <div class="auth-logo">
                                <img src="images/logo.png" alt="Logo HBNB">
                            </div>
                            <h1>Connexion</h1>
                            <br>
                            <form action="#" method="post" id="login-form" class="auth-form">
                                <label for="email">Adresse email</label>
                                <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
                                <br>
                                <label for="password">Mot de passe</label>
                                <input type="password" id="password" name="password" placeholder="••••••••" required>
                                <br>
                                <button type="submit" class="auth-btn">Se connecter</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div id="create-place-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card">
                        <div class="auth-card">
                            <div class="auth-logo">
                                <img src="images/logo.png" alt="Logo HBNB">
                            </div>
                            <h1>Créer une place</h1>
                            <br>
                            <form action="#" method="post" id="create-place-form" class="auth-form">
                                <label for="place-title">Titre</label>
                                <input type="text" id="place-title" name="title" placeholder="Studio moderne" required>
                                <label for="place-description">Description</label>
                                <textarea id="place-description" name="description" placeholder="Décrivez..." rows="2"></textarea>
                                <label for="place-price">Prix/nuit (€)</label>
                                <input type="number" id="place-price" name="price" placeholder="80" step="0.01" required>
                                <label for="place-latitude">Latitude</label>
                                <input type="number" id="place-latitude" name="latitude" placeholder="48.8566" step="0.0001" required>
                                <label for="place-longitude">Longitude</label>
                                <input type="number" id="place-longitude" name="longitude" placeholder="2.3522" step="0.0001" required>
                                <label>Commodités (optionnel)</label>
                                <div id="place-amenities-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; padding: 10px; background-color: #f9f9f9; border-radius: 4px;"></div>
                                <button type="submit" class="auth-btn">Créer</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div id="place-detail-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card">
                        <div class="auth-card" id="place-detail-card">
                            <div id="place-detail-content"></div>
                        </div>
                    </div>
                </div>
                <div id="profile-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card" style="max-width: 1000px; width: 95%;">
                        <div class="auth-card" style="max-width: 100%; max-height: 90vh; overflow-y: auto;">
                            <h1>Mon Profil</h1>
                            <hr>
                            <h3>Informations Personnelles</h3>
                            <form id="profile-edit-form" class="auth-form">
                                <label for="profile-first-name">Prénom</label>
                                <input type="text" id="profile-first-name" name="first_name" required>
                                <label for="profile-last-name">Nom</label>
                                <input type="text" id="profile-last-name" name="last_name" required>
                                <label for="profile-email">Email</label>
                                <input type="email" id="profile-email" name="email" disabled style="background-color: #f0f0f0; cursor: not-allowed;">
                                <button type="submit" class="auth-btn">Mettre à jour</button>
                            </form>
                            <hr>
                            <h3>Mes Places</h3>
                            <div id="my-places-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 15px;"></div>
                        </div>
                    </div>
                </div>
                <div id="admin-panel-modal" class="auth-modal-bg" style="display:none;">
                    <div class="center-auth-card" style="max-width: 600px;">
                        <div class="auth-card" style="max-width: 100%; max-height: 90vh; overflow-y: auto;">
                            <h1>Panneau Admin</h1>
                            <hr>
                            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                                <button id="admin-tab-users" class="admin-tab-btn active" style="flex: 1; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">👤 Utilisateurs</button>
                                <button id="admin-tab-amenities" class="admin-tab-btn" style="flex: 1; padding: 10px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔧 Amenities</button>
                            </div>
                            
                            <!-- Section Utilisateurs -->
                            <div id="admin-users-section" style="display: block;">
                                <h3>Créer un utilisateur</h3>
                                <form id="admin-create-user-form" class="auth-form">
                                    <label for="admin-first-name">Prénom</label>
                                    <input type="text" id="admin-first-name" name="first_name" placeholder="Jean" required>
                                    <label for="admin-last-name">Nom</label>
                                    <input type="text" id="admin-last-name" name="last_name" placeholder="Dupont" required>
                                    <label for="admin-email">Email</label>
                                    <input type="email" id="admin-email" name="email" placeholder="jean@example.com" required>
                                    <label for="admin-password">Mot de passe</label>
                                    <input type="password" id="admin-password" name="password" placeholder="••••••••" required>
                                    <div style="margin: 15px 0;">
                                        <label for="admin-is-admin" style="display: flex; align-items: center; cursor: pointer;">
                                            <input type="checkbox" id="admin-is-admin" name="is_admin" style="margin-right: 10px; width: auto;">
                                            <span>Cet utilisateur est administrateur</span>
                                        </label>
                                    </div>
                                    <button type="submit" class="auth-btn">Créer l'utilisateur</button>
                                </form>
                            </div>
                            
                            <!-- Section Amenities -->
                            <div id="admin-amenities-section" style="display: none;">
                                <h3>Créer une amenity</h3>
                                <form id="admin-create-amenity-form" class="auth-form">
                                    <label for="admin-amenity-name">Nom de l'amenity</label>
                                    <input type="text" id="admin-amenity-name" name="name" placeholder="ex: WiFi, Piscine, Jardin..." required>
                                    <button type="submit" class="auth-btn">Créer l'amenity</button>
                                </form>
                                <hr style="margin: 20px 0;">
                                <h3>Amenities existantes</h3>
                                <div id="amenities-list" style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; padding: 10px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="main-content">
                    <div id="logement-detail" class="logement-detail-card" style="display:none;"></div>
                    <table id="logements-table" cellpadding="20" align="center"></table>
    </main>
    <footer>
        <hr>
        <div style="display: flex; justify-content: center; align-items: center; position: relative; min-height: 40px;">
            <span style="position: absolute; right: 0;">
                <a href="https://github.com/tomvieilledent">About Us</a> |
                <a href="https://www.linkedin.com/in/tom-vieilledent-51a838199">Contact Us</a>
            </span>
            <span style="margin: 0 auto; font-weight: bold;">Tom Vieilledent - Holberton HBNB - 2026</span>
        </div>
    </footer>


<script>
document.addEventListener('DOMContentLoaded', function() {
            // Déclarer les variables au début
            var openBtn = document.getElementById('open-auth-modal');
            var logoutBtn = document.getElementById('logout-btn');
            var createPlaceBtn = document.getElementById('create-place-btn');
            var adminPanelBtn = document.getElementById('admin-panel-btn');
            var authModal = document.getElementById('auth-modal');
            var createPlaceModal = document.getElementById('create-place-modal');
            var adminPanelModal = document.getElementById('admin-panel-modal');
            var mainContent = document.getElementById('main-content');
            var loginForm = document.getElementById('login-form');
            var createPlaceForm = document.getElementById('create-place-form');
            var adminCreateUserForm = document.getElementById('admin-create-user-form');
            var closeTimeout = null;
            var isConnected = false;
            var placeDetailModal = document.getElementById('place-detail-modal');
            
            // Vérifier si l'utilisateur est déjà connecté
            const token = localStorage.getItem('access_token');
            if (token) {
                openBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                // Load user info and display profile button with initials
                const userId = localStorage.getItem('user_id');
                fetch(`http://127.0.0.1:5000/api/v1/users/${userId}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(r => r.json())
                .then(user => {
                    const initials = (user.first_name?.charAt(0) || '') + (user.last_name?.charAt(0) || '');
                    const profileBtn = document.getElementById('profile-btn');
                    profileBtn.textContent = initials.toUpperCase();
                    profileBtn.style.display = 'inline-block';
                    
                    // Vérifier si l'utilisateur est admin
                    if (user.is_admin) {
                        adminPanelBtn.style.display = 'inline-block';
                        createPlaceBtn.style.display = 'none';
                    } else {
                        createPlaceBtn.style.display = 'inline-block';
                        adminPanelBtn.style.display = 'none';
                    }
                });
                isConnected = true;
            }
            
            // Gestion de la tuile de détail logement
            var logementDetail = document.getElementById('logement-detail');
            var logementsTable = document.getElementById('logements-table');
            function showLogementDetail(img, title, ville) {
                    logementDetail.innerHTML = `
                        <div class="logement-detail-inner">
                            <img src="${img}" alt="${title}" class="logement-detail-img">
                            <div class="logement-detail-info">
                                <h2>${title}</h2>
                                <p>${ville}</p>
                            </div>
                        </div>
                        <button class="close-detail-arrow" id="close-detail-arrow" aria-label="Fermer la fiche">&#8595;</button>
                    `;
                    logementDetail.classList.add('show-detail');
                    logementDetail.style.display = 'flex';
                    setTimeout(function() {
                        logementDetail.classList.add('visible');
                        logementsTable.classList.add('shifted');
                    }, 10);
                    logementDetail.scrollIntoView({behavior: 'smooth', block: 'start'});
                    document.getElementById('close-detail-arrow').onclick = function() {
                        logementDetail.classList.remove('visible');
                        logementsTable.classList.remove('shifted');
                        setTimeout(function() {
                            logementDetail.classList.remove('show-detail');
                            logementDetail.style.display = 'none';
                        }, 350);
                    };
            }
            
            // Gestion des clics sur les boutons
            openBtn.onclick = function(e) {
        e.preventDefault();
        authModal.style.display = 'flex';
        setTimeout(function() {
            authModal.classList.add('visible');
            document.querySelector('.auth-card').classList.add('visible');
        }, 10);
        mainContent.classList.add('blur-bg');
        openBtn.classList.add('active');
        if (closeTimeout) {
            clearTimeout(closeTimeout);
            closeTimeout = null;
        }
    };
    // Fonction de fermeture
    function closeAuthModal() {
        authModal.classList.remove('visible');
        document.querySelector('.auth-card').classList.remove('visible');
        setTimeout(function() {
            authModal.style.display = 'none';
        }, 350);
        mainContent.classList.remove('blur-bg');
        if (!isConnected) {
            openBtn.classList.remove('active');
        }
    }
    // Ferme la modale si clic sur le fond
    authModal.onclick = function(e) {
        // Empêche la fermeture si le focus est sur un input du formulaire
        var active = document.activeElement;
        if (e.target === this && !(active && (active.id === 'email' || active.id === 'password'))) {
            closeAuthModal();
        }
    };
    // Connexion : cache le bouton connexion, affiche déconnexion
    loginForm.onsubmit = function(e) {
        e.preventDefault();
        
        // Récupérer les valeurs du formulaire
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        
        // Désactiver le bouton pendant la requête
        submitBtn.disabled = true;
        submitBtn.textContent = 'Connexion...';
        
        // Faire la requête POST au backend
        fetch('http://127.0.0.1:5000/api/v1/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.error || 'Erreur de connexion');
                });
            }
            return response.json();
        })
        .then(data => {
            // Sauvegarder le token JWT et l'ID utilisateur
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_email', email);
            localStorage.setItem('user_id', data.user_id);
            
            // Fermer la modale et mettre à jour l'interface
            closeAuthModal();
            openBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            
            // Load user info and display profile button with initials
            fetch(`http://127.0.0.1:5000/api/v1/users/${data.user_id}`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(r => r.json())
            .then(user => {
                const initials = (user.first_name?.charAt(0) || '') + (user.last_name?.charAt(0) || '');
                const profileBtn = document.getElementById('profile-btn');
                profileBtn.textContent = initials.toUpperCase();
                profileBtn.style.display = 'inline-block';
                
                // Vérifier si l'utilisateur est admin
                if (user.is_admin) {
                    adminPanelBtn.style.display = 'inline-block';
                    createPlaceBtn.style.display = 'none';
                } else {
                    createPlaceBtn.style.display = 'inline-block';
                    adminPanelBtn.style.display = 'none';
                }
            });
            
            openBtn.classList.remove('active');
            isConnected = true;
            
            // Réinitialiser le formulaire
            loginForm.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            
            // Message de succès (optionnel)
            alert('Connexion réussie!');
        })
        .catch(error => {
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            alert('Erreur: ' + error.message);
            console.error('Erreur de connexion:', error);
        });
    };
    // Déconnexion : inverse
    logoutBtn.onclick = function(e) {
        e.preventDefault();
        // Vider le token, l'email et l'ID de l'utilisateur du localStorage
        localStorage.removeItem('access_token');
        localStorage.removeItem('user_email');
        localStorage.removeItem('user_id');
        
        logoutBtn.style.display = 'none';
        createPlaceBtn.style.display = 'none';
        adminPanelBtn.style.display = 'none';
        document.getElementById('profile-btn').style.display = 'none';
        openBtn.style.display = 'inline-block';
        isConnected = false;
        
        // Fermer les modales
        adminPanelModal.classList.remove('visible');
        adminPanelModal.style.display = 'none';
        mainContent.classList.remove('blur-bg');
        
        // Désactive le hover tant que la souris n'est pas ressortie
        openBtn.classList.add('no-hover');
        alert('Vous avez été déconnecté!');
    };
    
    // Gestion du bouton Admin Panel
    adminPanelBtn.onclick = function(e) {
        e.preventDefault();
        adminPanelModal.style.display = 'flex';
        setTimeout(function() {
            adminPanelModal.classList.add('visible');
            document.querySelectorAll('#admin-panel-modal .auth-card')[0].classList.add('visible');
        }, 10);
        mainContent.classList.add('blur-bg');
    };
    
    // Ferme la modale admin si clic sur le fond
    adminPanelModal.onclick = function(e) {
        if (e.target === this) {
            adminPanelModal.classList.remove('visible');
            document.querySelectorAll('#admin-panel-modal .auth-card')[0].classList.remove('visible');
            setTimeout(function() {
                adminPanelModal.style.display = 'none';
                mainContent.classList.remove('blur-bg');
            }, 350);
        }
    };
    
    // Soumission du formulaire de création d'utilisateur
    adminCreateUserForm.onsubmit = function(e) {
        e.preventDefault();
        
        const firstName = document.getElementById('admin-first-name').value;
        const lastName = document.getElementById('admin-last-name').value;
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;
        const isAdmin = document.getElementById('admin-is-admin').checked;
        
        const submitBtn = adminCreateUserForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Création...';
        
        const token = localStorage.getItem('access_token');
        
        fetch('http://127.0.0.1:5000/api/v1/users/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                first_name: firstName,
                last_name: lastName,
                email: email,
                password: password,
                is_admin: isAdmin
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.message || data.error || 'Erreur de création');
                });
            }
            return response.json();
        })
        .then(data => {
            alert('Utilisateur créé avec succès!');
            adminCreateUserForm.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            adminPanelModal.classList.remove('visible');
            document.querySelectorAll('#admin-panel-modal .auth-card')[0].classList.remove('visible');
            setTimeout(function() {
                adminPanelModal.style.display = 'none';
                mainContent.classList.remove('blur-bg');
            }, 350);
        })
        .catch(error => {
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            alert('Erreur: ' + error.message);
            console.error('Erreur de création:', error);
        });
    };
    
    // Gestion des onglets du panneau admin
    const adminTabUsers = document.getElementById('admin-tab-users');
    const adminTabAmenities = document.getElementById('admin-tab-amenities');
    const adminUsersSection = document.getElementById('admin-users-section');
    const adminAmenitiesSection = document.getElementById('admin-amenities-section');
    const adminCreateAmenityForm = document.getElementById('admin-create-amenity-form');
    
    adminTabUsers.onclick = function(e) {
        e.preventDefault();
        // Afficher section utilisateurs, masquer amenities
        adminUsersSection.style.display = 'block';
        adminAmenitiesSection.style.display = 'none';
        // Mettre à jour styles des onglets
        adminTabUsers.style.backgroundColor = '#007bff';
        adminTabAmenities.style.backgroundColor = '#6c757d';
    };
    
    adminTabAmenities.onclick = function(e) {
        e.preventDefault();
        // Afficher section amenities, masquer utilisateurs
        adminUsersSection.style.display = 'none';
        adminAmenitiesSection.style.display = 'block';
        // Mettre à jour styles des onglets
        adminTabUsers.style.backgroundColor = '#6c757d';
        adminTabAmenities.style.backgroundColor = '#007bff';
        // Charger les amenities existantes
        loadAmenities();
    };
    
    // Fonction pour charger et afficher les amenities existantes
    function loadAmenities() {
        const amenitiesList = document.getElementById('amenities-list');
        amenitiesList.innerHTML = '<p>Chargement...</p>';
        
        fetch('http://127.0.0.1:5000/api/v1/amenities/', {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(amenities => {
            if (!amenities || amenities.length === 0) {
                amenitiesList.innerHTML = '<p style="color: #999;">Aucune amenity existante</p>';
            } else {
                amenitiesList.innerHTML = amenities.map(amenity => `
                    <div style="padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                        <span style="flex: 1;">${amenity.name}</span>
                        <span style="color: #999; font-size: 0.85rem;">(${amenity.id.substring(0, 8)}...)</span>
                    </div>
                `).join('');
            }
        })
        .catch(error => {
            amenitiesList.innerHTML = '<p style="color: red;">Erreur lors du chargement des amenities</p>';
            console.error('Erreur:', error);
        });
    }
    
    // Soumission du formulaire de création d'amenity
    adminCreateAmenityForm.onsubmit = function(e) {
        e.preventDefault();
        
        const amenityName = document.getElementById('admin-amenity-name').value;
        const submitBtn = adminCreateAmenityForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Création...';
        
        const token = localStorage.getItem('access_token');
        
        fetch('http://127.0.0.1:5000/api/v1/amenities/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                name: amenityName
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.message || data.error || 'Erreur de création');
                });
            }
            return response.json();
        })
        .then(data => {
            alert('Amenity créée avec succès!');
            adminCreateAmenityForm.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            // Recharger la liste
            loadAmenities();
        })
        .catch(error => {
            submitBtn.disabled = false;
            submitBtn.textContent = originalBtnText;
            alert('Erreur: ' + error.message);
            console.error('Erreur de création:', error);
        });
    };
    
    // Fonction pour charger et afficher les amenities comme checkboxes pour les places
    function loadAmenitiesForPlace(containerId) {
        const amenitiesList = document.getElementById(containerId);
        amenitiesList.innerHTML = '<p style="grid-column: 1/-1;">Chargement...</p>';
        
        fetch('http://127.0.0.1:5000/api/v1/amenities/', {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(amenities => {
            if (!amenities || amenities.length === 0) {
                amenitiesList.innerHTML = '<p style="grid-column: 1/-1; color: #999;">Aucune amenity disponible</p>';
            } else {
                amenitiesList.innerHTML = amenities.map(amenity => `
                    <div style="display: flex; align-items: center;">
                        <input type="checkbox" id="amenity-${amenity.id}" name="place-amenity" value="${amenity.id}" style="margin-right: 8px; width: auto;">
                        <label for="amenity-${amenity.id}" style="margin: 0; cursor: pointer;">${amenity.name}</label>
                    </div>
                `).join('');
            }
        })

    // Fonction pour charger et afficher les places depuis l'API
    function loadPlaces() {
        fetch('http://127.0.0.1:5000/api/v1/places/', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(places => {
            logementsTable.innerHTML = ''; // Vider la table
            
            if (!places || places.length === 0) {
                logementsTable.innerHTML = '<tr><td colspan="5" align="center"><p>Aucune place disponible</p></td></tr>';
                return;
            }
            
            // Construire le tableau avec 5 colonnes par ligne
            let currentRow = null;
            places.forEach((place, index) => {
                // Créer une nouvelle ligne tous les 5 éléments
                if (index % 5 === 0) {
                    currentRow = document.createElement('tr');
                    logementsTable.appendChild(currentRow);
                }
                
                // Générer une image aléatoire basée sur l'ID (pour la consistance)
                const logementIndex = (parseInt(place.id.split('-')[0]) || index) % 10;
                const imgSrc = `images/logement${logementIndex + 1}.jpg`;
                
                // Créer la cellule
                const td = document.createElement('td');
                td.align = 'center';
                td.className = 'logement-tile';
                td.setAttribute('data-img', imgSrc);
                td.setAttribute('data-title', place.title);
                td.setAttribute('data-place-id', place.id);
                td.setAttribute('data-ville', place.title); // Utiliser le titre ou latitude/longitude
                
                td.innerHTML = `
                    <img src="${imgSrc}" alt="${place.title}">
                    <h3>${place.title}</h3>
                    <p>${place.price}€/nuit</p>
                `;
                
                // Stocker l'objet place complet pour l'utiliser au clic
                td.placeData = place;
                td.imgSrc = imgSrc;
                
                currentRow.appendChild(td);
            });
            
            // Ajouter les event listeners aux tuiles
            document.querySelectorAll('.logement-tile').forEach(function(tile) {
                tile.addEventListener('click', function() {
                    showPlaceDetailModal(tile.placeData, tile.imgSrc);
                });
            });
        })
        .catch(error => {
            console.error('Erreur lors du chargement des places:', error);
            logementsTable.innerHTML = '<tr><td colspan="5" align="center"><p>Erreur lors du chargement des places</p></td></tr>';
        });
    }

                            `;
                        }).join('');

                        // Add view reviews handlers
                        document.querySelectorAll('.view-place-reviews-btn').forEach(btn => {
                            btn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                const placeId = this.getAttribute('data-place-id');
                                showPlaceReviewsModal(placeId);
                            });
                        });

                        // Add edit handlers
                        document.querySelectorAll('.edit-place-btn').forEach(btn => {
                            btn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                const placeId = this.getAttribute('data-place-id');
                                showPlaceEditModal(placeId);
                            });
                        });

                        // Add delete handlers
                        document.querySelectorAll('.delete-place-btn').forEach(btn => {
                            btn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                const placeId = this.getAttribute('data-place-id');
                                if (confirm('Êtes-vous sûr de vouloir supprimer cette place ?')) {
                                    deletePlace(placeId);
                                }
                            });
                        });

                        // Add card click handler
                        document.querySelectorAll('.my-place-card').forEach(card => {
                            card.addEventListener('click', function() {
                                const placeId = this.getAttribute('data-place-id');
                                showPlaceEditModal(placeId);
                            });
                        });
                    }
                });
        })
        .catch(error => console.error('Erreur:', error));
    }

    // Show Place Reviews Modal
    function showPlaceReviewsModal(placeId) {
        fetch(`http://127.0.0.1:5000/api/v1/places/${placeId}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(r => r.json())
        .then(place => {
            // Create reviews modal container
            const reviewsModalHTML = `
                <div id="place-reviews-modal" class="auth-modal-bg" style="display: none;">
                    <div class="center-auth-card">
                        <div class="auth-card" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
                            <h1>${place.title}</h1>
                            <hr>
                            <h3>Avis (${place.reviews ? place.reviews.length : 0})</h3>
                            <div id="reviews-modal-list" style="margin-top: 15px;"></div>
                        </div>
                    </div>
                </div>
            `;

            // Insert the modal into the DOM
            const existingModal = document.getElementById('place-reviews-modal');
            if (existingModal) {
                existingModal.remove();
            }
            document.body.insertAdjacentHTML('beforeend', reviewsModalHTML);
            
            // Show the modal
            setTimeout(function() {
                const reviewsModal = document.getElementById('place-reviews-modal');
                if (reviewsModal) {
                    reviewsModal.style.display = 'flex';
                    setTimeout(function() {
                        reviewsModal.classList.add('visible');
                        reviewsModal.querySelector('.auth-card').classList.add('visible');
                        mainContent.classList.add('blur-bg');
                    }, 10);
                }
            }, 10);

            // Populate reviews
            setTimeout(function() {
                const reviewsList = document.getElementById('reviews-modal-list');
                if (reviewsList) {
                    if (!place.reviews || place.reviews.length === 0) {
                        reviewsList.innerHTML = '<p style="color: #666;">Aucun avis</p>';
                    } else {
                        reviewsList.innerHTML = place.reviews.map(review => `
                            <div class="review-item" style="margin-bottom: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span class="review-rating">⭐ ${review.rating}/5</span>
                                    <span class="review-user" style="font-size: 0.9rem;">${review.user?.first_name || 'Anonyme'}</span>
                                </div>
                                <p style="margin: 8px 0; color: #666; font-size: 0.9rem;">${review.text || ''}</p>
                            </div>
                        `).join('');
                    }
                }
            }, 50);

            // Handle close by clicking on background
            setTimeout(function() {
                const reviewsModal = document.getElementById('place-reviews-modal');
                if (reviewsModal) {
                    reviewsModal.addEventListener('click', function(e) {
                        if (e.target === reviewsModal) {
                            reviewsModal.classList.remove('visible');
                            reviewsModal.querySelector('.auth-card').classList.remove('visible');
                            setTimeout(function() {
                                reviewsModal.remove();
                                mainContent.classList.remove('blur-bg');
                            }, 350);
                        }
                    });
                }
            }, 50);
        })
        .catch(error => {
            console.error('Erreur:', error);
            alert('Erreur lors du chargement des reviews');
        });
    }

    // Show Place Edit Modal
    function showPlaceEditModal(placeId) {
        const token = localStorage.getItem('access_token');
        
        fetch(`http://127.0.0.1:5000/api/v1/places/${placeId}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(r => r.json())
        .then(place => {
            // Create edit modal container - SANS LES REVIEWS
            const editModalHTML = `
                <div id="place-edit-modal" class="auth-modal-bg" style="display: none;">
                    <div class="center-auth-card">
                        <div class="auth-card" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
                            <h1>${place.title}</h1>
                            <hr>
                            <h3>Modifier la place</h3>
                            <form id="edit-place-form" class="auth-form">
                                <label for="edit-place-title">Titre</label>
                                <input type="text" id="edit-place-title" name="title" value="${place.title}" required>
                                <label for="edit-place-description">Description</label>
                                <textarea id="edit-place-description" name="description" rows="3">${place.description || ''}</textarea>
                                <label for="edit-place-price">Prix/nuit (€)</label>
                                <input type="number" id="edit-place-price" name="price" value="${place.price}" step="0.01" required>
                                <label for="edit-place-latitude">Latitude</label>
                                <input type="number" id="edit-place-latitude" name="latitude" value="${place.latitude}" step="0.0001" required>
                                <label for="edit-place-longitude">Longitude</label>
                                <input type="number" id="edit-place-longitude" name="longitude" value="${place.longitude}" step="0.0001" required>
                                <label>Commodités (optionnel)</label>
                                <div id="edit-place-amenities-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; padding: 10px; background-color: #f9f9f9; border-radius: 4px;"></div>
                                <button type="submit" class="auth-btn">Enregistrer les modifications</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            // Insert the modal into the DOM
            const existingModal = document.getElementById('place-edit-modal');
            if (existingModal) {
                existingModal.remove();
            }
            document.body.insertAdjacentHTML('beforeend', editModalHTML);
            
            // Show the modal
            setTimeout(function() {
                const editModal = document.getElementById('place-edit-modal');
                if (editModal) {
                    editModal.style.display = 'flex';
                    setTimeout(function() {
                        editModal.classList.add('visible');
                        editModal.querySelector('.auth-card').classList.add('visible');
                        mainContent.classList.add('blur-bg');
                    }, 10);
                }
            }, 10);

            // Handle form submission
            setTimeout(function() {
                const editForm = document.getElementById('edit-place-form');
                if (editForm) {
                    editForm.addEventListener('submit', function(e) {
                        e.preventDefault();
                        const formData = {
                            title: document.getElementById('edit-place-title').value,
                            description: document.getElementById('edit-place-description').value,
                            price: parseFloat(document.getElementById('edit-place-price').value),
                            latitude: parseFloat(document.getElementById('edit-place-latitude').value),
                            longitude: parseFloat(document.getElementById('edit-place-longitude').value)
                        };

                        fetch(`http://127.0.0.1:5000/api/v1/places/${placeId}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(formData)
                        })
                        .then(response => {
                            if (response.ok) {
                                alert('Place mise à jour avec succès');
                                const editModal = document.getElementById('place-edit-modal');
                                if (editModal) {
                                    editModal.classList.remove('visible');
                                    editModal.querySelector('.auth-card').classList.remove('visible');
                                    setTimeout(function() {
                                        editModal.remove();
                                        mainContent.classList.remove('blur-bg');
                                        loadMyPlaces();
                                    }, 350);
                                }
                            } else {
                                return response.json().then(data => {
                                    alert('Erreur: ' + (data.message || 'Impossible de mettre à jour'));
                                });
                            }
                        })
                        .catch(error => {
                            alert('Erreur: ' + error.message);
                            console.error('Erreur:', error);
                        });
                    });
                }
            }, 50);

            // Handle close by clicking on background
            setTimeout(function() {
                const editModal = document.getElementById('place-edit-modal');
                if (editModal) {
                    editModal.addEventListener('click', function(e) {
                        if (e.target === editModal) {
                            editModal.classList.remove('visible');
                            editModal.querySelector('.auth-card').classList.remove('visible');
                            setTimeout(function() {
                                editModal.remove();
                                mainContent.classList.remove('blur-bg');
                            }, 350);
                        }
                    });
                }
            }, 50);
        })
        .catch(error => {
            console.error('Erreur:', error);
            alert('Erreur lors du chargement de la place');
        });
    }

    // Delete Place
    function deletePlace(placeId) {
        const token = localStorage.getItem('access_token');
        
        fetch(`http://127.0.0.1:5000/api/v1/places/${placeId}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            }
        })
        .then(response => {
            if (response.ok) {
                loadMyPlaces();
            } else {
                alert('Erreur lors de la suppression');
            }
        })
        .catch(error => {
            console.error('Erreur:', error);
            alert('Erreur: ' + error.message);
        });
    }

    // Profile Update Form Handler
    const profileEditForm = document.getElementById('profile-edit-form');
    profileEditForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const userId = localStorage.getItem('user_id');
        const token = localStorage.getItem('access_token');
        const firstName = document.getElementById('profile-first-name').value;
        const lastName = document.getElementById('profile-last-name').value;

        fetch(`http://127.0.0.1:5000/api/v1/users/${userId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                first_name: firstName,
                last_name: lastName
            })
        })
        .then(response => {
            if (response.ok) {
                alert('Profil mis à jour avec succès');
                loadUserProfile();
            } else {
                return response.json().then(data => {
                    alert('Erreur: ' + (data.message || 'Impossible de mettre à jour'));
                });
            }
        })
        .catch(error => {
            console.error('Erreur:', error);
            alert('Erreur: ' + error.message);
        });
    });
});
</script>
</body>

</html>
